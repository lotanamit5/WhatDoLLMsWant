name: whatdo-llms-want
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - numpy
  - pandas
  - matplotlib
  - seaborn
  - scipy
  
  # --- PyTorch ecosystem moved to native Conda ---
  - pytorch
  - torchvision
  - torchaudio
  - pytorch-cuda=12.4
  
  - pip
  - pip:
      # --- Hugging Face & LLM packages kept exactly as before ---
      - transformers
      - tqdm
      - accelerate
      - peft